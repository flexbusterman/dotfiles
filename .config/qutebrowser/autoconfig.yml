# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  bindings.commands:
    global:
      normal:
        ',f': open www.facebook.com/messages/t
        ',m': hint links spawn mpv {hint-url} --ytdl-raw-options=mark-watched=
        ',s': open https://mail.google.com/mail/u/0/;; open -t https://mail.google.com/mail/u/1/;;
          open -t https://mail.google.com/mail/u/2/;; open -t https://calendar.google.com/calendar/r/month;;
          open -t https://keep.google.com/u/0/;; open -t https://www.facebook.com/messages/t/;;
          open -t https://app.slack.com/client/T3SMMM8F8/CB5NVC78W;; open -t https://app.slack.com/client/TF3UUPZNZ/CH5G52FPS;;
          open -t https://www.dropbox.com/h;; tab-focus 1
        ',y': open www.youtube.com
  colors.webpage.bg:
    global: black
  colors.webpage.darkmode.enabled:
    global: true
  content.geolocation:
    https://www.google.com.ar: false
  content.notifications:
    https://cutewallpaper.org: false
    https://splendidprizeforyou.com: false
    https://www.facebook.com: false
    https://www.networkworld.com: false
    https://www.reddit.com: false
  content.register_protocol_handler:
    https://calendar.google.com?cid=%25s: true
    https://mail.google.com?extsrc=mailto&url=%25s: true
  fonts.default_family:
    global: RobotoMono
  fonts.default_size:
    global: 16px
  url.default_page:
    global: about:blank
  url.searchengines:
    global:
      DEFAULT: https://www.google.com.ar/search?q={}
      d: https://duckduckgo.com/?q={}
      y: https://www.youtube.com/results?search_query={}
  url.start_pages:
    global: about:blank
